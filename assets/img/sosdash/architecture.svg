<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 640" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L6,3 L0,6 Z" fill="#94a3b8"/>
    </marker>
  </defs>

  <rect x="10" y="10" width="840" height="620" rx="16" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>

  <!-- 1. User query -->
  <rect x="270" y="34" width="320" height="46" rx="23" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="430" y="62" font-size="13.5" font-style="italic" fill="#1d4ed8" text-anchor="middle">"Pesticide use in Spain since 2015 &#8212; and why?"</text>
  <line x1="430" y1="80" x2="430" y2="108" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 2. Orchestrator -->
  <rect x="215" y="112" width="430" height="68" rx="10" fill="#2563eb"/>
  <text x="430" y="140" font-size="16" font-weight="700" fill="#ffffff" text-anchor="middle">Orchestrator</text>
  <text x="430" y="162" font-size="12" fill="#dbeafe" text-anchor="middle">JSON-mode ReAct loop &#183; swappable LLM &#183; never touches data directly</text>
  <line x1="430" y1="180" x2="430" y2="208" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 3. Tool layer -->
  <rect x="50" y="212" width="760" height="96" rx="10" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="66" y="234" font-size="12" font-weight="700" fill="#64748b">TOOL LAYER</text>
  <!-- chips -->
  <g font-size="11.5" font-weight="600" fill="#334155" text-anchor="middle">
    <rect x="66" y="246" width="134" height="46" rx="7" fill="#ffffff" stroke="#94a3b8"/>
    <text x="133" y="274">CatalogSearch</text>
    <rect x="212" y="246" width="134" height="46" rx="7" fill="#ffffff" stroke="#94a3b8"/>
    <text x="279" y="274">DataFetcher</text>
    <rect x="358" y="246" width="134" height="46" rx="7" fill="#ffffff" stroke="#94a3b8"/>
    <text x="425" y="268">Methodology</text>
    <text x="425" y="282">Lookup</text>
    <rect x="504" y="246" width="134" height="46" rx="7" fill="#ffffff" stroke="#94a3b8"/>
    <text x="571" y="274">PolicyLookup</text>
    <rect x="650" y="246" width="134" height="46" rx="7" fill="#ffffff" stroke="#94a3b8"/>
    <text x="717" y="274">DataJoiner</text>
  </g>
  <line x1="430" y1="308" x2="430" y2="336" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 4. Elasticsearch -->
  <rect x="50" y="340" width="760" height="166" rx="10" fill="#f0fdfa" stroke="#14b8a6" stroke-width="1.5"/>
  <text x="66" y="362" font-size="12" font-weight="700" fill="#0f766e">ELASTICSEARCH &#8212; one store, two retrieval modes</text>

  <!-- ES sub-boxes -->
  <g>
    <rect x="66" y="374" width="172" height="118" rx="7" fill="#ffffff" stroke="#5eead4" stroke-width="1.5"/>
    <text x="152" y="398" font-size="12.5" font-weight="700" fill="#0f766e" text-anchor="middle">L1 &#183; Metadata catalog</text>
    <text x="152" y="424" font-size="10.5" fill="#475569" text-anchor="middle">Which dataset holds</text>
    <text x="152" y="438" font-size="10.5" fill="#475569" text-anchor="middle">the answer?</text>
    <text x="152" y="466" font-size="10" fill="#94a3b8" text-anchor="middle">lexical search</text>

    <rect x="254" y="374" width="172" height="118" rx="7" fill="#ffffff" stroke="#5eead4" stroke-width="1.5"/>
    <text x="340" y="398" font-size="12.5" font-weight="700" fill="#0f766e" text-anchor="middle">Data indexes</text>
    <text x="340" y="424" font-size="10.5" fill="#475569" text-anchor="middle">The numbers.</text>
    <text x="340" y="438" font-size="10.5" fill="#475569" text-anchor="middle">Structured ES query,</text>
    <text x="340" y="452" font-size="10.5" fill="#475569" text-anchor="middle">aggregated in-engine</text>
    <text x="340" y="478" font-size="10" fill="#94a3b8" text-anchor="middle">computed in the DB, not the LLM</text>

    <rect x="442" y="374" width="172" height="118" rx="7" fill="#ffffff" stroke="#5eead4" stroke-width="1.5"/>
    <text x="528" y="398" font-size="12.5" font-weight="700" fill="#0f766e" text-anchor="middle">L2 &#183; Methodology</text>
    <text x="528" y="424" font-size="10.5" fill="#475569" text-anchor="middle">Definitions &amp;</text>
    <text x="528" y="438" font-size="10.5" fill="#475569" text-anchor="middle">data-quality notes</text>
    <text x="528" y="466" font-size="10" fill="#94a3b8" text-anchor="middle">vector search</text>

    <rect x="630" y="374" width="164" height="118" rx="7" fill="#ffffff" stroke="#5eead4" stroke-width="1.5"/>
    <text x="712" y="398" font-size="12.5" font-weight="700" fill="#0f766e" text-anchor="middle">L3 &#183; Policy evidence</text>
    <text x="712" y="424" font-size="10.5" fill="#475569" text-anchor="middle">Source-cited policy</text>
    <text x="712" y="438" font-size="10.5" fill="#475569" text-anchor="middle">excerpts</text>
    <text x="712" y="466" font-size="10" fill="#94a3b8" text-anchor="middle">vector search</text>
  </g>
  <line x1="430" y1="506" x2="430" y2="534" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 5. Output -->
  <rect x="150" y="538" width="560" height="68" rx="10" fill="#ecfdf5" stroke="#16a34a" stroke-width="1.5"/>
  <text x="430" y="564" font-size="14" font-weight="700" fill="#15803d" text-anchor="middle">Verified answer</text>
  <text x="430" y="586" font-size="11.5" fill="#166534" text-anchor="middle">chart spec + grounded number + cited evidence + step-by-step derivation trace</text>

  <!-- ===== brand logos on nodes ===== -->
  <!-- Ollama (white) on the orchestrator: self-hosted qwq:32b -->
